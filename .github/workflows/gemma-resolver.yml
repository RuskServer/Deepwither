name: Gemma 4 Issue Resolver (On-Demand)

on:
  issue_comment:
    types: [created]

jobs:
  ai-solution:
    # 実行条件：
    # 1. コメントが /solve で始まること
    # 2. コメント投稿者がリポジトリのオーナー、または協力者(COLLABORATOR)であること
    # 3. ボット自身のコメントには反応しないこと
    if: >
      startsWith(github.event.comment.body, '/solve') && 
      (github.event.comment.author_association == 'OWNER' || github.event.comment.author_association == 'COLLABORATOR') &&
      github.event.comment.user.type != 'Bot'
    
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Solve with Gemma 4
        uses: actions/github-script@v7
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        with:
          script: |
            const comment = context.payload.comment;
            const issue = context.payload.issue;
            
            // 1. 受付確認のリアクション（👀）をつける
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: comment.id,
              content: 'eyes'
            });

            // 2. プロンプトの準備
            const instruction = comment.body.replace('/solve', '').trim();
            const prompt = `
            You are an expert software engineer using Gemma 4 31B.
            Analyze the following GitHub Issue and the specific instruction from the user.
            
            【User Instruction】: ${instruction || "Provide a fix for this issue."}
            【Issue Title】: ${issue.title}
            【Issue Description】: ${issue.body}
            
            Please provide a detailed solution, including code snippets or a diff format if applicable.
            `;

            try {
              // 3. Gemma 4 31B へのAPIリクエスト
              const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemma-4-31b-it:generateContent?key=${process.env.GEMINI_API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  contents: [{ parts: [{ text: prompt }] }],
                  generationConfig: {
                    thinking_config: { include_thoughts: true }
                  }
                })
              });

              if (!response.ok) throw new Error(`API Error: ${response.statusText}`);

              const data = await response.json();
              const suggestion = data.candidates[0].content.parts[0].text;

              // 4. 結果をIssueにコメントとして投稿
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `## 🤖 Gemma 4 31B の提案\n\n> **依頼内容:** ${instruction || "全般的な修正案"}\n\n${suggestion}`
              });

              // 完了のリアクション（🚀）を追加
              await github.rest.reactions.createForIssueComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: comment.id,
                content: 'rocket'
              });

            } catch (error) {
              console.error(error);
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `❌ エラーが発生しました: ${error.message}`
              });
            }
