name: Gemma 4 Issue Resolver (Strict Clean Output)
on:
  issue_comment:
    types: [created]
jobs:
  ai-solution:
    if: startsWith(github.event.comment.body, '/solve') && github.event.comment.user.type != 'Bot'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      repository-projects: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Solve with Gemma 4
        uses: actions/github-script@v7
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        with:
          script: |
            // 1. 権限チェック (Admin or Write)
            const perms = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: context.payload.comment.user.login
            });
            if (!['admin', 'write'].includes(perms.data.permission)) return;
            // 2. リアクション
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'eyes'
            });
            const issue = context.payload.issue;
            const instruction = context.payload.comment.body.replace('/solve', '').trim();
            // 3. プロンプト（「出力形式を厳守せよ」と強調）
            const prompt = `
            あなたはシニアエンジニアです。以下のIssueに対して、簡潔で実用的な解決策のみを日本語で回答してください。
            
            【厳守事項】
            - 思考プロセスや内部的な分析（Role:, Input:, Thinking:等）は一切出力しないでください。
            - 挨拶や前置きは不要です。
            - 解決策、方針、具体的なコード例のみを出力してください。
            【Issueタイトル】: ${issue.title}
            【Issue本文】: ${issue.body}
            【追加指示】: ${instruction || "データ統合と不足ステータスの定義を行ってください。"}
            `;
            try {
              const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${process.env.GEMINI_API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  contents: [{ parts: [{ text: prompt }] }],
                  generationConfig: {
                    temperature: 0.2,
                    maxOutputTokens: 2048
                  }
                })
              });
              
              const responseText = await response.text();
              console.log('Raw API Response:', responseText);
              
              let data;
              try {
                data = JSON.parse(responseText);
              } catch (e) {
                throw new Error(`Failed to parse JSON: ${responseText}`);
              }
              
              if (!response.ok) {
                throw new Error(`HTTP ${response.status}: ${data.error?.message || responseText}`);
              }
              
              console.log('Parsed data:', JSON.stringify(data, null, 2));
              
              if (!data.candidates || data.candidates.length === 0) {
                throw new Error(`No candidates in response`);
              }
              
              const candidate = data.candidates[0];
              let suggestion = '';
              
              // 最初に content.parts をチェック
              if (candidate.content?.parts?.[0]?.text) {
                suggestion = candidate.content.parts
                  .map(part => part.text || '')
                  .filter(t => t)
                  .join('\n')
                  .trim();
              } else {
                console.log('Candidate structure:', JSON.stringify(candidate, null, 2));
                throw new Error(`Cannot find text in candidate`);
              }
              
              // 🔑 修正ポイント2: 複数の思考パターンをフィルタリング
              // XML形式の思考タグ
              suggestion = suggestion.replace(/<think>[\s\S]*?<\/think>/gi, '');
              suggestion = suggestion.replace(/<thought>[\s\S]*?<\/thought>/gi, '');
              suggestion = suggestion.replace(/<internal>[\s\S]*?<\/internal>/gi, '');
              
              // Markdown形式の思考タグ
              suggestion = suggestion.replace(/```thinking[\s\S]*?```/gi, '');
              suggestion = suggestion.replace(/```thought[\s\S]*?```/gi, '');
              
              // 思考プロセスの日本語テンプレート
              suggestion = suggestion.replace(/【思考プロセス】[\s\S]*?(?=【|$)/gi, '');
              suggestion = suggestion.replace(/思考:[\s\S]*?(?=\n\n|$)/gi, '');
              
              // 複数の改行を1つに統一
              suggestion = suggestion.replace(/\n{3,}/g, '\n\n').trim();
              
              // 🔑 修正ポイント3: 空白や無効な応答をチェック
              if (!suggestion || suggestion.length < 10) {
                suggestion = '申し訳ございません。APIから有効な応答が得られませんでした。もう一度試してください。';
              }
              
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `## 🤖 Gemma 2 27B の提案\n\n${suggestion}`
              });
              await github.rest.reactions.createForIssueComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: context.payload.comment.id,
                content: 'rocket'
              });
            } catch (error) {
              console.error('Error:', error);
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `❌ エラーが発生しました\n\n\`\`\`\n${error.message}\n\`\`\``
              });
            }
