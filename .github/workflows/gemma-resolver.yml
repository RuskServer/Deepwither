name: Gemma 4 Issue Resolver (On-Demand)

on:
  issue_comment:
    types: [created]

jobs:
  ai-solution:
    if: >
      startsWith(github.event.comment.body, '/solve') && 
      github.event.comment.user.type != 'Bot'
    
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Solve with Gemma 4
        uses: actions/github-script@v7
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        with:
          script: |
            const comment = context.payload.comment;
            const issue = context.payload.issue;
            
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: comment.id,
              content: 'eyes'
            });

            const instruction = comment.body.replace('/solve', '').trim();
            
            // プロンプトを日本語で明確に指示
            const prompt = `
            あなたはシニアソフトウェアエンジニアです。
            以下のGitHub Issueの内容を分析し、ユーザーの指示に基づいた具体的な解決策を日本語で回答してください。
            
            【ユーザーの指示】: ${instruction || "このIssueの解決策を提案してください。"}
            【Issueタイトル】: ${issue.title}
            【Issue本文】: ${issue.body}
            
            回答は、思考プロセスを含めず、最終的な解決策（コード例や修正方針）のみを分かりやすく出力してください。
            `;

            try {
              const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemma-4-31b-it:generateContent?key=${process.env.GEMINI_API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  contents: [{ parts: [{ text: prompt }] }],
                  generationConfig: {
                    // 思考プロセスを隠して、きれいな回答だけを出力させる
                    thinking_config: { include_thoughts: false } 
                  }
                })
              });

              if (!response.ok) throw new Error(`API Error: ${response.statusText}`);

              const data = await response.json();
              const suggestion = data.candidates[0].content.parts[0].text;

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `## 🤖 Gemma 4 31B の回答\n\n${suggestion}`
              });

              await github.rest.reactions.createForIssueComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: comment.id,
                content: 'rocket'
              });

            } catch (error) {
              console.error(error);
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `❌ エラーが発生しました: ${error.message}`
              });
            }
