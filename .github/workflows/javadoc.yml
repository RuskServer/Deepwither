name: Build and Deploy Javadoc

on:
  push:
    branches: [ "master" ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      # 1. 通常のビルド (テスト実行 + JAR作成)
      - name: Build with Maven
        run: mvn clean package

      # 2. Javadocの生成
      - name: Generate Javadoc
        run: mvn javadoc:javadoc -Dencoding=UTF-8 -Dcharset=UTF-8

      # 3. ビルド成果物 (JARファイル等) をGitHub上に保存
      # GitHub Actionsの「Summary」タブからダウンロード可能になります
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-assets
          path: target/*.jar

      # 4. JavadocをGitHub Pages用にアップロード
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'target/reports/apidocs'

      # 5. GitHub Pagesへのデプロイ
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
