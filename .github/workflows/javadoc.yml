name: Build and Deploy Javadoc

on:
  push:
    branches: [ "master" ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn clean package

      - name: Generate Javadoc
        run: mvn javadoc:javadoc -Dencoding=UTF-8 -Dcharset=UTF-8

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-assets
          path: target/*.jar

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'target/reports/apidocs'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4

      # 6. Discordへの通知とファイル送信
      - name: Notify and Upload to Discord
        if: always()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          # 1. まずステータス通知（sarisia/actions-status-discordの代わりをcurlで実行）
          STATUS="${{ job.status }}"
          COLOR=$([ "$STATUS" = "success" ] && echo "3066993" || echo "15158332")
          
          curl -H "Content-Type: application/json" \
               -X POST \
               -d '{
                 "embeds": [{
                   "title": "Build & Deploy Javadoc: '"$STATUS"'",
                   "color": '"$COLOR"',
                   "description": "Repository: ${{ github.repository }}\nJavadoc: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
                 }]
               }' $DISCORD_WEBHOOK

          # 2. 成功時のみJARファイルをアップロード
          if [ "$STATUS" = "success" ]; then
            # target/配下の最初のJARファイルを取得
            JAR_PATH=$(ls target/*.jar | head -n 1)
            
            echo "Uploading $JAR_PATH to Discord..."
            curl -X POST \
                 -F "file=@$JAR_PATH" \
                 -F "payload_json={\"content\": \"📦 Build Artifact (JAR)\"}" \
                 $DISCORD_WEBHOOK
          fi
