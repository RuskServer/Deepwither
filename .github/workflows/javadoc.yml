name: Build and Deploy Javadoc

on:
  push:
    branches: [ "master" ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn clean package

      - name: Generate Javadoc
        run: mvn javadoc:javadoc -Dencoding=UTF-8 -Dcharset=UTF-8

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-assets
          path: target/*.jar

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'target/reports/apidocs'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4

      # 6. Discordへの通知とファイル送信
      - name: Notify Discord
        if: always() # ビルド失敗時も通知する場合
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          # 成功/失敗に応じて色が変わる通知
          status: ${{ job.status }}
          title: "Build & Deploy Javadoc"
          description: |
            **Repository:** ${{ github.repository }}
            **Branch:** ${{ github.ref_name }}
            **Javadoc:** https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
          # JARファイルをDiscordに直接アップロードする設定
          content: "Build artifacts are ready!"
          image: "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png"
          file: target/*.jar # ここでビルドしたJARを指定
